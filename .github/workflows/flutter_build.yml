name: Flutter Multi-Platform Release

on:
  release:
    types: [published]

jobs:
  build_android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'

      - name: Clean Flutter pub
        run: flutter clean

      - name: Flutter pub get
        run: flutter pub get

      - name: Decode Android keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/stocknotes-keystore.jks

      - name: Create key.properties
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=stocknotes-keystore.jks
          EOF

      - name: Build Android APK
        run: flutter build apk --release --target-platform android-arm64

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            ${{ github.workspace }}/build/app/outputs/apk/release/app-release.apk

  build_macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'

      - name: Clean Flutter pub
        run: flutter clean

      - name: Enable Swift Package Manager
        run: flutter config --enable-swift-package-manager

      - name: Flutter pub get
        run: flutter pub get

      - name: Clean macOS CocoaPods
        run: |
          cd macos
          rm -rf Pods Podfile.lock
          pod repo update
          pod install
          cd ..

      - name: Build macOS App
        run: flutter build macos --release

      - name: Zip macOS App
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent *.app macos-stocknote.zip
          mv macos-stocknote.zip ${{ github.workspace }}

      - name: Upload macOS zip to GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ${{ github.workspace }}/macos-stocknote.zip

  build_windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'

      - name: Clean Flutter pub
        run: flutter clean

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows App
        run: flutter build windows --release

      - name: Zip Windows App
        run: |
          cd build/windows/x64/runner/Release
          powershell -Command "Compress-Archive -Path * -DestinationPath windows-stocknote.zip"
          mv windows-stocknote.zip ${{ github.workspace }}

      - name: Upload Windows zip to GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ${{ github.workspace }}/windows-stocknote.zip
