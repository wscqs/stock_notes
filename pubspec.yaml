name: stock_notes
description: "Stock Notes"
publish_to: 'none'
version: 2.5.0+25

environment:
  sdk: ^3.6.0

dependencies:
  cupertino_icons: ^1.0.8
  get: ^4.7.3 #路由/状态插件
  #get: ^5.0.0-release-candidate-9.3.2 #中间件有点问题（SplashMiddleware正式版再试看看）
  #dio: ^5.8.0+1 //web不能运行
  dio: ^5.10.0
  visibility_detector: ^0.4.0+2
  fl_charset: ^1.0.2

  convert: ^3.1.2
  intl: ^0.20.2  # 格式化日期
  crypto: ^3.0.7  # 生成 MD5
  encrypt: ^5.0.3
  connectivity_plus: ^7.2.0
  app_links: ^7.0.0 #记住要看文档，深链接需手动关闭

  #UI
  flex_color_scheme: ^8.4.0 # 主题
  flutter_screenutil: ^5.9.3
  flutter_smart_dialog: ^5.1.0 #https://xdd666t.github.io/flutter_use/web/index.html?dialogType=AttachDialogBusiness#/smartDialog
  #flutter_inappwebview: ^6.2.0-beta.3 #window有 bug，关闭还占内存
  zikzak_inappwebview: ^4.4.4
  flutter_slidable: ^4.0.3 #cell滑动事件
  photo_view: ^0.15.0 #图片预览
  dropdown_button2: ^3.0.0-beta.25
  flutter_auto_size_text: ^5.0.0
  flutter_quill: ^11.5.0  #https://github.com/fleather-editor/fleather 文字按钮颜色等可以参考
  flutter_quill_extensions: ^11.0.0  # 用于支持图片等嵌入功能
  #图片预览与保存 https://juejin.cn/post/7295654213618073615?searchId=2024092915095437248644A536B2AA155A
  #readmore: ^3.0.0
  #linkfy_text: ^1.1.6 文本链接化

  #icon (remixicon胜出 https://remixicon.com/）
  remixicon: ^4.9.3
  #font_awesome_flutter: ^10.8.0
  #remixicon: ^1.4.1
  #lucide_icons_flutter: ^2.0.3

  #存储
  shared_preferences: ^2.5.5
  #get_storage: ^2.1.1
  hive_ce: ^2.19.3
  drift: ^2.33.0 #数据库 github自动打包 cocopods 没最新
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0+eol
  drift_db_viewer: ^2.1.0 #测试看数据
  path_provider: ^2.1.6
  #  isar: ^3.1.0+1

  #原生相关
  #  image_gallery_saver: ^2.0.3
  image_picker: ^1.2.3  # 用于从相册选择图片
  #  share_plus: ^9.0.0
  permission_handler: ^12.0.3  # 用于请求权限
  package_info_plus: ^8.3.0
  device_info_plus: ^11.3.3
  # flutter_udid: ^4.0.0 #设备唯一标识
  url_launcher: ^6.3.2
  file_picker: ^10.2.0 #更新最新版 win冲突无法适配（后续更新）
  share_plus: ^11.0.0

  # 如果需要使用国际化，请添加以下依赖
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6
  package_rename: ^1.10.0
  drift_dev: ^2.26.1
  build_runner: ^2.4.15 #dart run build_runner build

flutter:
  uses-material-design: true
  assets:
    - assets/images/

# dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/icon.png"
  remove_alpha_ios: true
 # min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/images/icon.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/images/icon.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/images/icon.png"

# dart run flutter_native_splash:create
flutter_native_splash:
  color: "#ffffff"
  color_dark: "#000000"
  image: assets/images/icon.png
  image_dark: assets/images/icon.png
  android: true
  ios: true
  ##  branding: assets/images/icon.png
  #  color_dark: "#ffffff"
  #  image_dark: assets/images/icon.png
  android_12: #我鸿蒙走了这逻辑，image不设置自动拿icon
    color: "#ffffff"
    color_dark: "#000000"
    image: assets/images/icon.png
    image_dark: assets/images/icon.png
  web: true

# dart run package_rename
package_rename_config:
  android:
    app_name: 股票笔记
    package_name: com.cqs.stocknotes
    override_old_package: com.cqs.stock_notes
    lang: kotlin

  ios:
    app_name: 股票笔记
    bundle_name: stocknotes
    package_name: com.cqs.stocknotes
#
